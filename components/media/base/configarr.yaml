apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: configarr
spec:
  interval: 1h
  serviceAccountName: flux
  url: oci://ghcr.io/ssouthcity/charts/configarr
  ref:
    semver: ~0
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: extract
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: ^https://token\.actions\.githubusercontent\.com$
        subject: ^https://github\.com/ssouthcity/charts/\.github/workflows/publish-chart\.yaml@refs/heads/main$
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: configarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: configarr
  values:
    env:
      - name: SONARR_API_KEY
        valueFrom:
          secretKeyRef:
            name: sonarr
            key: SONARR__AUTH__APIKEY
