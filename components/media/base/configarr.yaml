apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: configarr
spec:
  interval: 1h
  serviceAccountName: flux
  url: oci://ghcr.io/ssouthcity/charts/configarr
  ref:
    semver: ~0
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: extract
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: ^https://token\.actions\.githubusercontent\.com$
        subject: ^https://github\.com/ssouthcity/charts/\.github/workflows/publish-chart\.yaml@refs/heads/main$
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: configarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: configarr
  values:
    env:
      - name: SONARR_API_KEY
        valueFrom:
          secretKeyRef:
            name: sonarr-auth
            key: SONARR__AUTH__APIKEY
      - name: QBITTORRENT_USERNAME
        valueFrom:
          secretKeyRef:
            name: qbittorrent-auth
            key: username
      - name: QBITTORRENT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: qbittorrent-auth
            key: password
    config:
      config.yml: |
        trashGuideUrl: https://github.com/TRaSH-Guides/Guides
        recyclarrConfigUrl: https://github.com/recyclarr/config-templates

        sonarr:
          sonarr-anime:
            base_url: http://sonarr:8989
            api_key: !env SONARR_API_KEY

            quality_definition:
              type: series

            include:
              - template: sonarr-quality-definition-series
              - template: sonarr-v4-quality-profile-web-1080p
              - template: sonarr-v4-custom-formats-web-1080p
              - template: sonarr-v4-quality-profile-web-2160p
              - template: sonarr-v4-custom-formats-web-2160p

            custom_formats: []

            download_clients:
              data:
                - name: qBittorrent
                  type: qbittorrent
                  enable: true
                  priority: 1
                  remove_completed_downloads: true
                  remove_failed_downloads: true
                  tags: []
                  fields:
                    host: qbittorrent
                    port: 8080
                    use_ssl: false
                    url_base: /
                    username: !env QBITTORRENT_USERNAME
                    password: !env QBITTORRENT_PASSWORD
                    tv_category: anime
              delete_unmanaged:
                enabled: true
        radarr: {}
