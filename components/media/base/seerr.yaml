apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: seerr
spec:
  interval: 1h
  serviceAccountName: flux
  url: oci://ghcr.io/seerr-team/seerr/seerr-chart
  ref:
    semver: ~3
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: extract
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: ^https://token\.actions\.githubusercontent\.com$
        subject: ^https://github\.com/seerr-team/seerr/\.github/workflows/helm\.yml@refs/heads/develop$
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: seerr
  values:
    route:
      main:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Seerr
          gethomepage.dev/description: Media Requests
          gethomepage.dev/group: Media
          gethomepage.dev/icon: seerr.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/instance=seerr"
        parentRefs:
          - name: http
            namespace: kgateway
        hostnames:
          - seerr.${CLUSTER_DOMAIN}
